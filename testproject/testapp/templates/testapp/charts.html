{% extends "testapp/base.html" %}

{% block title %}Charts - Django Morph Test{% endblock %}

{% block content %}
<h1>Charts</h1>
<p>ApexCharts re-render after morph navigation. Navigate away and come back to verify.</p>

<div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin:1rem 0;">
    <div class="card">
        <h3>Bar Chart</h3>
        <div id="chart-bar"></div>
    </div>
    <div class="card">
        <h3>Donut Chart</h3>
        <div id="chart-donut"></div>
    </div>
</div>
<div class="card" style="margin:1rem 0;">
    <h3>Line Chart</h3>
    <div id="chart-line"></div>
</div>

<script src="/static/django_morph/apexcharts.min.js" data-morph-static></script>
<script>
    function initCharts() {
        if (typeof ApexCharts === "undefined") return;

        var chartCount = (window.__chartCount || 0) + 1;
        window.__chartCount = chartCount;
        document.title = "Charts (render #" + chartCount + ")";

        var barOptions = {
            chart: { type: "bar", height: 250 },
            series: [{ name: "Sales", data: [30, 40, 35, 50, 49, 60, 70] }],
            xaxis: { categories: ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"] },
            colors: ["#29d"]
        };
        new ApexCharts(document.querySelector("#chart-bar"), barOptions).render();

        var lineOptions = {
            chart: { type: "line", height: 250 },
            series: [
                { name: "Revenue", data: [45, 52, 38, 65, 48, 70, 82] },
                { name: "Expenses", data: [30, 28, 45, 35, 40, 25, 50] }
            ],
            xaxis: { categories: ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul"] },
            colors: ["#16a34a", "#dc2626"]
        };
        new ApexCharts(document.querySelector("#chart-line"), lineOptions).render();

        var donutOptions = {
            chart: { type: "donut", height: 250 },
            series: [44, 55, 13, 33, 12],
            labels: ["Team A", "Team B", "Team C", "Team D", "Team E"],
            colors: ["#29d", "#16a34a", "#d97706", "#dc2626", "#7c3aed"]
        };
        new ApexCharts(document.querySelector("#chart-donut"), donutOptions).render();
    }

    if (typeof ApexCharts !== "undefined") {
        initCharts();
    } else {
        window.addEventListener("load", initCharts);
    }
</script>
{% endblock %}
