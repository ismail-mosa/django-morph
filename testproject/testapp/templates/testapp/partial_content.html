<div class="card mb-3">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Items (Partial Content)</h5>
        <span class="badge bg-secondary" id="partial-count">{{ items|length }} items</span>
    </div>
    <div class="card-body">
        <div class="list-group">
            {% for item in items %}
            <div class="list-group-item d-flex justify-content-between align-items-center">
                <div>
                    <strong>{{ item.title }}</strong>
                    <span class="text-muted ms-2">{{ item.description }}</span>
                </div>
                <span class="badge bg-primary rounded-pill">{{ item.created_at|date:"M d" }}</span>
            </div>
            {% empty %}
            <div class="list-group-item text-center text-muted">No items yet</div>
            {% endfor %}
        </div>
    </div>
</div>

<div class="d-flex gap-2">
    <a href="/partial/?refresh=1" class="btn btn-outline-primary">Refresh List (Morph)</a>
    <a href="/partial/?refresh=1" class="btn btn-outline-secondary" data-morph="false">Full Reload</a>
</div>
